name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      apk_name:
        description: 'APK Output Name (without extension)'
        required: false
        default: 'WinEmulator'
        type: string

jobs:
  build:
    name: Build ${{ inputs.build_type }} APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-config-cache: false

      - name: Configure Gradle properties
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError" >> ~/.gradle/gradle.properties
          echo "org.gradle.parallel=true" >> ~/.gradle/gradle.properties
          echo "org.gradle.daemon=true" >> ~/.gradle/gradle.properties
          echo "org.gradle.caching=false" >> ~/.gradle/gradle.properties
          cat ~/.gradle/gradle.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/sdk
          key: ${{ runner.os }}-android-sdk-${{ hashFiles('**/local.properties') }}

      - name: Create local.properties
        run: |
          if [ -z "$ANDROID_HOME" ]; then
            echo "sdk.dir=/opt/android-sdk" > local.properties
          else
            echo "sdk.dir=$ANDROID_HOME" > local.properties
          fi

      - name: Create Android debug keystore
        run: |
          KEYSTORE_DIR="/home/runner/.config/.android"
          mkdir -p "$KEYSTORE_DIR"
          if [ ! -f "$KEYSTORE_DIR/debug.keystore" ]; then
            echo "Creating debug keystore at $KEYSTORE_DIR..."
            keytool -genkey -v -keystore "$KEYSTORE_DIR/debug.keystore" -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi
          echo "Debug keystore ready at $KEYSTORE_DIR"

      - name: Fix termux dependency version
        run: |
          echo "Checking termux dependencies..."

          CURRENT_VERSION=$(grep 'termux = ' gradle/libs.versions.toml | sed 's/termux = "\(.*\)"/\1/')
          echo "Current termux version in project: $CURRENT_VERSION"

          # Check if termux-view pom already exists
          JITPACK_POM="https://jitpack.io/com/github/termux/termux-app/terminal-view/${CURRENT_VERSION}/terminal-view-${CURRENT_VERSION}.pom"

          if curl -s -f "$JITPACK_POM" > /dev/null 2>&1; then
            echo "✅ Termux version $CURRENT_VERSION is available on JitPack"
          else
            echo "⚠️  Termux version $CURRENT_VERSION NOT on JitPack yet"
            echo "🔨 Triggering JitPack build for: $CURRENT_VERSION"

            # Trigger JitPack build for terminal-view
            curl -s "https://jitpack.io/com/github/termux/termux-app/terminal-view/${CURRENT_VERSION}/terminal-view-${CURRENT_VERSION}.aar" || true
            sleep 5

            # Trigger JitPack build for termux-shared
            curl -s "https://jitpack.io/com/github/termux/termux-app/termux-shared/${CURRENT_VERSION}/termux-shared-${CURRENT_VERSION}.aar" || true
            sleep 5

            echo "⏳ Waiting for JitPack to build termux dependencies..."
            echo "📋 This may take a few minutes. Checking build status..."

            # Wait and check for pom file
            for i in {1..12}; do
              sleep 10
              if curl -s -f "$JITPACK_POM" > /dev/null 2>&1; then
                echo "✅ Termux build completed successfully!"
                break
              fi
              echo "⏳ Still building... ($i/12)"
            done

            # Final check
            if ! curl -s -f "$JITPACK_POM" > /dev/null 2>&1; then
              echo "⚠️  JitPack build may still be in progress"
              echo "📋 The build will continue and may succeed if JitPack finishes"
            fi
          fi

          echo "Final termux version: $(grep 'termux = ' gradle/libs.versions.toml | sed 's/termux = "\(.*\)"/\1/')"

      - name: Download termux-shared module
        run: |
          echo "🔧 Setting up termux-shared as local module..."

          TERMUX_SHARED_URL="https://github.com/afeimod/WinEmulator/releases/download/tx11/termux-shared.zip"

          echo "📥 Downloading termux-shared from: $TERMUX_SHARED_URL"
          curl -L -o termux-shared.zip "$TERMUX_SHARED_URL"

          if [ -f "termux-shared.zip" ]; then
            echo "📦 Extracting termux-shared..."
            unzip -o termux-shared.zip

            # Check if it extracted to a subdirectory
            if [ -d "termux-shared-termux-shared" ]; then
              rm -rf termux-shared
              mv termux-shared-termux-shared termux-shared
            elif [ -d "termux-app-master/termux-shared" ]; then
              rm -rf termux-shared
              mv termux-app-master/termux-shared termux-shared
              rm -rf termux-app-master
            fi

            rm -f termux-shared.zip
            echo "✅ termux-shared extracted"
            ls -la termux-shared/
          else
            echo "❌ Failed to download termux-shared"
            exit 1
          fi

      - name: Setup configuration files
        run: |
          echo "🔧 Setting up configuration files..."

          # Base URL for downloading files from GitHub patchs directory
          BASE_URL="https://raw.githubusercontent.com/afeimod/WinEmulator/master/patchs"

          # 1. Download settings.gradle.kts
          echo "📥 Downloading settings.gradle.kts..."
          curl -fL -o settings.gradle.kts "$BASE_URL/settings.gradle.kts" || { echo "❌ Failed to download settings.gradle.kts"; exit 1; }

          # 2. Download termux-shared/build.gradle.kts
          echo "📥 Downloading termux-shared build.gradle.kts..."
          curl -fL -o termux-shared/build.gradle.kts "$BASE_URL/termux-shared.gradle.kts" || { echo "❌ Failed to download termux-shared.gradle.kts"; exit 1; }

          # 3. Download AndroidManifest.xml
          mkdir -p termux-shared/src/main
          echo "📥 Downloading AndroidManifest.xml..."
          curl -fL -o termux-shared/src/main/AndroidManifest.xml "$BASE_URL/termux-shared-manifest.xml" || { echo "❌ Failed to download termux-shared-manifest.xml"; exit 1; }

          echo "✅ All files downloaded successfully"
          echo "📄 Current settings.gradle.kts:"
          cat settings.gradle.kts

      - name: Verify Xfuncproto.h exists
        run: |
          if [ -f "tx11/src/main/cpp/xorgproto/include/X11/Xfuncproto.h" ]; then
            echo "✅ Xfuncproto.h found in project"
          else
            echo "⚠️  Xfuncproto.h not found in tx11 submodule"
            echo "📋 Checking tx11 directory structure..."
            ls -la tx11/src/main/cpp/ 2>/dev/null || echo "tx11 directory missing or incomplete"
          fi

      - name: Setup tx11 from GitHub Release
        run: |
          echo "🔧 Downloading tx11 source from GitHub Release..."

          TX11_URL="https://github.com/afeimod/WinEmulator/releases/download/tx11/tx11.zip"
          TX11_DIR="tx11"

          # Download and extract tx11 if not already present
          if [ ! -f "$TX11_DIR/src/main/cpp/xorgproto/include/X11/Xfuncproto.h" ]; then
            echo "📥 Downloading tx11 from: $TX11_URL"
            curl -L -o tx11.zip "$TX11_URL"

            if [ -f "tx11.zip" ]; then
              echo "📦 Extracting tx11.zip..."
              unzip -o tx11.zip -d . 2>/dev/null || unzip -o tx11.zip

              # Check if extracted content needs to be moved
              if [ -d "tx11-main" ]; then
                echo "📁 Moving tx11-main content to tx11..."
                rm -rf "$TX11_DIR"
                mv tx11-main "$TX11_DIR"
              fi

              # Clean up
              rm -f tx11.zip
              echo "✅ tx11 extracted successfully"
            else
              echo "❌ Failed to download tx11"
            fi
          else
            echo "✅ tx11 already exists"
          fi

          # Verify Xfuncproto.h
          if [ -f "$TX11_DIR/src/main/cpp/xorgproto/include/X11/Xfuncproto.h" ]; then
            echo "✅ Xfuncproto.h verified!"
          else
            echo "❌ Xfuncproto.h still missing after extraction"
            ls -la "$TX11_DIR/src/main/cpp/xorgproto/include/X11/" 2>/dev/null || true
          fi

      - name: Fix terminaltest module
        run: |
          echo "🔧 Checking terminaltest module..."

          # Remove terminaltest if it causes issues
          if grep -q "include.*:terminaltest" settings.gradle.kts 2>/dev/null; then
            echo "⚠️  Removing terminaltest to avoid compilation issues..."
            sed -i '/include.*:terminaltest/d' settings.gradle.kts
            echo "✅ terminaltest excluded from build"
          else
            echo "✅ terminaltest not in project"
          fi

      - name: Build ${{ inputs.build_type }} APK
        run: |
          echo "Starting build..."
          if [ "${{ inputs.build_type }}" = "release" ]; then
            ./gradlew :app:assembleRelease --no-configuration-cache 2>&1 | tee build.log
          else
            ./gradlew :app:assembleDebug --no-configuration-cache 2>&1 | tee build.log
          fi

      - name: Show Kotlin compilation errors
        if: failure()
        run: |
          echo "=== Kotlin Compilation Errors ==="
          grep -A 5 "error:" build.log | head -50 || echo "No 'error:' found, showing last 100 lines..."
          echo ""
          echo "=== Last 50 lines of build log ==="
          tail -50 build.log

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ inputs.build_type }}
          path: build.log
          retention-days: 7

      - name: Prepare APK name
        id: apk_info
        run: |
          if [ "${{ inputs.build_type }}" = "release" ]; then
            APK_PATH="app/build/outputs/apk/release/app-release.apk"
          else
            APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          fi
          APK_NAME="${{ inputs.apk_name }}-${{ inputs.build_type }}.apk"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk_info.outputs.apk_name }}
          path: ${{ steps.apk_info.outputs.apk_path }}
          retention-days: 30

      - name: Display APK info
        if: success()
        run: |
          echo "✅ Build completed successfully!"
          echo "📦 APK location: ${{ steps.apk_info.outputs.apk_path }}"
          echo "📎 Artifact name: ${{ steps.apk_info.outputs.apk_name }}"

          if [ "${{ inputs.build_type }}" = "release" ]; then
            APK_FILE="app/build/outputs/apk/release/app-release.apk"
          else
            APK_FILE="app/build/outputs/apk/debug/app-debug.apk"
          fi

          if [ -f "$APK_FILE" ]; then
            echo "📁 APK size: $(du -h $APK_FILE | cut -f1)"
            echo "🔍 APK info:"
            $ANDROID_HOME/build-tools/35.0.0/aapt dump badging $APK_FILE 2>/dev/null | head -5 || echo "aapt not available"
          fi
