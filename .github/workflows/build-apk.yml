name: Build WinEmulator APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      apk_name:
        description: 'APK Output Name (without extension)'
        required: false
        default: 'WinEmulator'
        type: string

jobs:
  build:
    name: Build ${{ inputs.build_type }} APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Extract termux modules
        run: |
          echo "Extracting termux modules from zip..."

          if [ -f "termux-app-master.zip" ]; then
            unzip -o termux-app-master.zip -d temp_termux

            TERMUX_APP_DIR=$(find temp_termux -type d -name "termux-app*" | head -1)

            if [ -d "$TERMUX_APP_DIR/terminal-view" ]; then
              rm -rf terminal-view
              cp -r "$TERMUX_APP_DIR/terminal-view" .
              echo "terminal-view extracted"
            fi

            if [ -d "$TERMUX_APP_DIR/termux-shared" ]; then
              rm -rf termux-shared
              cp -r "$TERMUX_APP_DIR/termux-shared" .
              echo "termux-shared extracted"
            fi

            rm -rf temp_termux
          else
            echo "termux-app-master.zip not found"
          fi

      - name: Remove old build.gradle files
        run: |
          echo "Removing old build.gradle files..."

          # Remove old Groovy build.gradle files
          rm -f terminal-view/build.gradle
          rm -f termux-shared/build.gradle

          echo "Old build.gradle files removed"

      - name: Download config files
        run: |
          echo "Downloading config files from patchs folder..."

          # Download terminal-view/build.gradle.kts
          curl -fL -o terminal-view/build.gradle.kts "https://raw.githubusercontent.com/afeimod/WinEmulator/master/patchs/terminal-view.gradle.kts"

          # Download termux-shared/build.gradle.kts
          curl -fL -o termux-shared/build.gradle.kts "https://raw.githubusercontent.com/afeimod/WinEmulator/master/patchs/termux-shared.gradle.kts"

          # Download settings.gradle.kts
          curl -fL -o settings.gradle.kts "https://raw.githubusercontent.com/afeimod/WinEmulator/master/patchs/settings.gradle.kts"

          echo "Config files downloaded"
          echo "terminal-view/build.gradle.kts:"
          cat terminal-view/build.gradle.kts

      - name: Update app dependencies
        run: |
          echo "Updating app dependencies..."

          sed -i 's/implementation(libs.com.termux.terminal.view)/implementation(project(":terminal-view"))/g' app/build.gradle.kts
          sed -i 's/implementation(libs.com.termux.termux.shared)/implementation(project(":termux-shared"))/g' app/build.gradle.kts

          echo "App dependencies updated"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-config-cache: false

      - name: Configure Gradle properties
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m" >> ~/.gradle/gradle.properties
          echo "org.gradle.parallel=true" >> ~/.gradle/gradle.properties
          echo "org.gradle.daemon=true" >> ~/.gradle/gradle.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties
        run: |
          if [ -z "$ANDROID_HOME" ]; then
            echo "sdk.dir=/opt/android-sdk" > local.properties
          else
            echo "sdk.dir=$ANDROID_HOME" > local.properties
          fi

      - name: Create Android debug keystore
        run: |
          KEYSTORE_DIR="/home/runner/.config/.android"
          mkdir -p "$KEYSTORE_DIR"
          if [ ! -f "$KEYSTORE_DIR/debug.keystore" ]; then
            keytool -genkey -v -keystore "$KEYSTORE_DIR/debug.keystore" -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build APK
        run: |
          echo "Starting build..."
          if [ "${{ inputs.build_type }}" = "release" ]; then
            ./gradlew :app:assembleRelease --no-configuration-cache 2>&1 | tee build.log
          else
            ./gradlew :app:assembleDebug --no-configuration-cache 2>&1 | tee build.log
          fi

      - name: Show errors
        if: failure()
        run: |
          echo "=== Build Errors ==="
          grep -E "(error:|FAILED)" build.log | head -30 || true
          tail -50 build.log

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Prepare APK info
        id: apk_info
        if: success()
        run: |
          if [ "${{ inputs.build_type }}" = "release" ]; then
            echo "apk_path=app/build/outputs/apk/release/app-release.apk" >> $GITHUB_OUTPUT
          else
            echo "apk_path=app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_OUTPUT
          fi
          echo "apk_name=${{ inputs.apk_name }}-${{ inputs.build_type }}.apk" >> $GITHUB_OUTPUT

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk_info.outputs.apk_name }}
          path: ${{ steps.apk_info.outputs.apk_path }}
          retention-days: 30

      - name: Display result
        if: success()
        run: |
          echo "Build completed!"
          echo "APK: ${{ steps.apk_info.outputs.apk_path }}"
