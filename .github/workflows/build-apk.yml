name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      apk_name:
        description: 'APK Output Name (without extension)'
        required: false
        default: 'WinEmulator'
        type: string

jobs:
  build:
    name: Build ${{ inputs.build_type }} APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/sdk
          key: ${{ runner.os }}-android-sdk-${{ hashFiles('**/local.properties') }}

      - name: Create local.properties
        run: |
          if [ -z "$ANDROID_HOME" ]; then
            echo "sdk.dir=/opt/android-sdk" > local.properties
          else
            echo "sdk.dir=$ANDROID_HOME" > local.properties
          fi

      - name: Create Android debug keystore
        run: |
          KEYSTORE_DIR="/home/runner/.config/.android"
          mkdir -p "$KEYSTORE_DIR"
          if [ ! -f "$KEYSTORE_DIR/debug.keystore" ]; then
            echo "Creating debug keystore at $KEYSTORE_DIR..."
            keytool -genkey -v -keystore "$KEYSTORE_DIR/debug.keystore" -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi
          echo "Debug keystore ready at $KEYSTORE_DIR"

      - name: Build ${{ inputs.build_type }} APK
        run: |
          if [ "${{ inputs.build_type }}" = "release" ]; then
            ./gradlew assembleRelease --stacktrace
          else
            ./gradlew assembleDebug --stacktrace
          fi

      - name: Prepare APK name
        id: apk_info
        run: |
          if [ "${{ inputs.build_type }}" = "release" ]; then
            APK_PATH="app/build/outputs/apk/release/app-release.apk"
          else
            APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          fi
          APK_NAME="${{ inputs.apk_name }}-${{ inputs.build_type }}.apk"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk_info.outputs.apk_name }}
          path: ${{ steps.apk_info.outputs.apk_path }}
          retention-days: 30

      - name: Display APK info
        run: |
          echo "✅ Build completed successfully!"
          echo "📦 APK location: ${{ steps.apk_info.outputs.apk_path }}"
          echo "📎 Artifact name: ${{ steps.apk_info.outputs.apk_name }}"

          if [ "${{ inputs.build_type }}" = "release" ]; then
            APK_FILE="app/build/outputs/apk/release/app-release.apk"
          else
            APK_FILE="app/build/outputs/apk/debug/app-debug.apk"
          fi

          if [ -f "$APK_FILE" ]; then
            echo "📁 APK size: $(du -h $APK_FILE | cut -f1)"
            echo "🔍 APK info:"
            $ANDROID_HOME/build-tools/35.0.0/aapt dump badging $APK_FILE 2>/dev/null | head -5 || echo "aapt not available"
          fi
