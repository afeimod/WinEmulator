name: Build WinEmulator APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      apk_name:
        description: 'APK Output Name (without extension)'
        required: false
        default: 'WinEmulator'
        type: string

jobs:
  build:
    name: Build ${{ inputs.build_type }} APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Clone termux-app for modules
        run: |
          echo "Cloning termux-app repository..."
          git clone --depth 1 https://github.com/termux/termux-app.git termux-app-temp

          for module in terminal-emulator terminal-view termux-shared; do
            if [ -d "termux-app-temp/$module" ]; then
              rm -rf "$module"
              cp -r "termux-app-temp/$module" .
              echo "$module cloned"
            fi
          done
          rm -rf termux-app-temp

      - name: Remove old build.gradle files
        run: |
          rm -f terminal-view/build.gradle termux-view/build.gradle 2>/dev/null || true
          rm -f termux-shared/build.gradle 2>/dev/null || true
          rm -f terminal-emulator/build.gradle 2>/dev/null || true
          echo "Old build.gradle files removed"

      - name: Download config files from patchs
        run: |
          echo "Downloading config files..."

          # Download settings.gradle.kts FIRST (this is critical!)
          curl -fL -o settings.gradle.kts "https://raw.githubusercontent.com/afeimod/WinEmulator/master/patchs/settings.gradle.kts"
          echo "settings.gradle.kts downloaded"

          # Download module configs
          curl -fL -o terminal-emulator/build.gradle.kts "https://raw.githubusercontent.com/afeimod/WinEmulator/master/patchs/terminal-emulator.gradle.kts"
          curl -fL -o terminal-view/build.gradle.kts "https://raw.githubusercontent.com/afeimod/WinEmulator/master/patchs/terminal-view.gradle.kts"
          curl -fL -o termux-shared/build.gradle.kts "https://raw.githubusercontent.com/afeimod/WinEmulator/master/patchs/termux-shared.gradle.kts"

          echo "All config files downloaded"

      - name: Fix termux-shared FileUtils.java
        run: |
          echo "Fixing FileUtils.java for Guava compatibility..."

          sed -i 's/import com.google.common.io.RecursiveDeleteOption;//g' termux-shared/src/main/java/com/termux/shared/file/FileUtils.java
          sed -i 's/com.google.common.io.MoreFiles.deleteRecursively(file.toPath(), RecursiveDeleteOption.ALLOW_INSECURE);/org.apache.commons.io.FileUtils.deleteDirectory(file);/g' termux-shared/src/main/java/com/termux/shared/file/FileUtils.java
          sed -i 's/com.google.common.io.MoreFiles.deleteDirectoryContents(file.toPath(), RecursiveDeleteOption.ALLOW_INSECURE);/org.apache.commons.io.FileUtils.deleteDirectory(file);/g' termux-shared/src/main/java/com/termux/shared/file/FileUtils.java

          echo "FileUtils.java fixed"

      - name: Update app dependencies
        run: |
          echo "Updating app build.gradle.kts dependencies..."
          sed -i 's/implementation(libs.com.termux.terminal.view)/implementation(project(":terminal-view"))/g' app/build.gradle.kts
          sed -i 's/implementation(libs.com.termux.termux.shared)/implementation(project(":termux-shared"))/g' app/build.gradle.kts
          echo "App dependencies updated"

      - name: Verify module setup
        run: |
          echo "=== Module Structure ==="
          ls -la terminal-emulator/build.gradle.kts 2>/dev/null && echo "terminal-emulator: OK" || echo "terminal-emulator: MISSING"
          ls -la terminal-view/build.gradle.kts 2>/dev/null && echo "terminal-view: OK" || echo "terminal-view: MISSING"
          ls -la termux-shared/build.gradle.kts 2>/dev/null && echo "termux-shared: OK" || echo "termux-shared: MISSING"
          ls -la settings.gradle.kts 2>/dev/null && echo "settings.gradle.kts: OK" || echo "settings.gradle.kts: MISSING"
          echo "=== Settings Content ==="
          cat settings.gradle.kts

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-config-cache: false

      - name: Configure Gradle
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m" >> ~/.gradle/gradle.properties
          echo "org.gradle.parallel=true" >> ~/.gradle/gradle.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties
        run: |
          if [ -z "$ANDROID_HOME" ]; then
            echo "sdk.dir=/opt/android-sdk" > local.properties
          else
            echo "sdk.dir=$ANDROID_HOME" > local.properties
          fi

      - name: Create Android debug keystore
        run: |
          KEYSTORE_DIR="/home/runner/.config/.android"
          mkdir -p "$KEYSTORE_DIR"
          if [ ! -f "$KEYSTORE_DIR/debug.keystore" ]; then
            keytool -genkey -v -keystore "$KEYSTORE_DIR/debug.keystore" -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build APK
        run: |
          echo "Starting build..."
          if [ "${{ inputs.build_type }}" = "release" ]; then
            ./gradlew :app:assembleRelease --no-configuration-cache 2>&1 | tee build.log
          else
            ./gradlew :app:assembleDebug --no-configuration-cache 2>&1 | tee build.log
          fi

      - name: Show errors
        if: failure()
        run: |
          grep -E "(error:|FAILED|What went wrong)" build.log | head -50 || true
          tail -100 build.log

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Prepare APK info
        id: apk_info
        if: success()
        run: |
          if [ "${{ inputs.build_type }}" = "release" ]; then
            echo "apk_path=app/build/outputs/apk/release/app-release.apk" >> $GITHUB_OUTPUT
          else
            echo "apk_path=app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_OUTPUT
          fi
          echo "apk_name=${{ inputs.apk_name }}-${{ inputs.build_type }}.apk" >> $GITHUB_OUTPUT

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk_info.outputs.apk_name }}
          path: ${{ steps.apk_info.outputs.apk_path }}
          retention-days: 30

      - name: Display result
        if: success()
        run: |
          echo "Build completed!"
          echo "APK: ${{ steps.apk_info.outputs.apk_path }}"
